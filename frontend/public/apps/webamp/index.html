<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Winamp</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      #app {
        position: fixed;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- Webamp : clone de Winamp (MIT) — https://webamp.org -->
    <script src="https://unpkg.com/webamp@1.5.0/built/webamp.bundle.min.js"></script>
    <!-- Visualiseur Milkdrop (Butterchurn), comme sur winamp.org -->
    <script src="https://unpkg.com/butterchurn@2.6.7/lib/butterchurn.min.js"></script>
    <script src="https://unpkg.com/butterchurn-presets@2.4.7/lib/butterchurnPresets.min.js"></script>
    <script>
      const Webamp = window.Webamp
      if (Webamp && Webamp.browserIsSupported()) {
        const webamp = new Webamp({
          initialTracks: [
            {
              metaData: { artist: 'DJ Mike Llama', title: "Llama Whippin' Intro" },
              url: 'https://cdn.jsdelivr.net/gh/captbaritone/webamp@43434d82cfe9e37286806/mp3/llama-2.91.mp3',
              duration: 5.322286,
            },
          ],
          // Visualiseur Milkdrop ouvert au démarrage
          __butterchurnOptions: {
            importButterchurn: () => Promise.resolve(window.butterchurn),
            getPresets: () => {
              const presets = window.butterchurnPresets.getPresets()
              return Object.keys(presets).map((name) => ({
                name,
                butterchurnPresetObject: presets[name],
              }))
            },
            butterchurnOpen: true,
          },
        })

        // Pas de barre de titre XP : la croix de Winamp ferme la fenêtre parente.
        webamp.onClose(() => {
          try {
            window.parent.postMessage('webamp-close', '*')
          } catch (e) {
            /* noop */
          }
        })

        webamp.renderWhenReady(document.getElementById('app'))
      } else {
        document.getElementById('app').innerHTML =
          '<p style="color:#fff;font-family:sans-serif;padding:16px">Ton navigateur ne supporte pas Webamp.</p>'
      }
    </script>
  </body>
</html>
